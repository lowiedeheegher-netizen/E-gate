<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="color-scheme" content="dark">
<title>E-gate — Inloggen</title>
<link rel="stylesheet" href="/style.css">
</head>
<body>

<nav class="nav">
  <a class="nav-brand" href="/">E<span style="color:var(--text-muted)">-</span>GATE</a>
  <div class="nav-spacer"></div>
  <span style="font-size:12px;color:var(--text-muted);letter-spacing:2px;text-transform:uppercase">Beheerder</span>
</nav>

<div class="auth-page">
  <div class="auth-box">
    <div class="auth-logo">
      <div class="auth-logo-text">E-GATE</div>
    </div>

    <div class="auth-card">
      <h1 class="auth-title">Inloggen</h1>
      <p class="auth-sub">Welkom terug.</p>

      <div id="error-msg" style="display:none;background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.2);border-radius:8px;padding:10px 14px;font-size:13px;color:#f87171;margin-bottom:18px"></div>

      <div class="field">
        <label class="field-label" for="email">Email</label>
        <input class="field-input" id="email" type="email" placeholder="jij@email.com" autocomplete="email" required>
      </div>

      <div class="field">
        <label class="field-label" for="password">Wachtwoord</label>
        <input class="field-input" id="password" type="password" placeholder="Jouw wachtwoord" autocomplete="current-password" required>
      </div>

      <button class="btn btn--primary btn--full" id="login-btn" style="margin-top:4px" type="button">
        Inloggen
      </button>
    </div>

    <div class="auth-footer" style="display:flex;flex-direction:column;gap:8px">
      <a href="/forgot-password.html" style="color:var(--text-muted);font-size:12px">Wachtwoord vergeten?</a>
      Privé-platform &mdash; alleen voor de beheerder
    </div>
  </div>
</div>

<script>
(function() {
  if (localStorage.getItem('egate_token')) {
    window.location.href = '/dashboard.html';
    return;
  }

  var btn   = document.getElementById('login-btn');
  var errEl = document.getElementById('error-msg');

  function showError(msg) {
    errEl.textContent = msg;
    errEl.style.display = 'block';
  }

  btn.addEventListener('click', async function() {
    var email    = document.getElementById('email').value.trim();
    var password = document.getElementById('password').value;

    errEl.style.display = 'none';
    if (!email || !password) { showError('Vul alle velden in.'); return; }

    btn.disabled = true;
    btn.textContent = 'Inloggen\u2026';

    try {
      var res  = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: email, password: password })
      });
      var data = await res.json();
      if (!res.ok) { showError(data.error || 'Inloggen mislukt'); btn.disabled = false; btn.textContent = 'Inloggen'; return; }
      localStorage.setItem('egate_token', data.token);
      localStorage.setItem('egate_name',  data.name);
      window.location.href = '/dashboard.html';
    } catch(e) {
      showError('Verbindingsfout. Probeer opnieuw.');
      btn.disabled = false;
      btn.textContent = 'Inloggen';
    }
  });

  document.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') btn.click();
  });
}());
</script>
<script src="/chrome-bg.js"></script>
</body>
</html>
