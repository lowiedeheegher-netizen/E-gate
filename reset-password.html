<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="color-scheme" content="dark">
<title>Nieuw wachtwoord — E-gate</title>
<link rel="stylesheet" href="/style.css">
</head>
<body>
<nav class="nav"><a class="nav-brand" href="/">E<span style="color:var(--text-muted)">-</span>GATE</a></nav>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-brand">E-GATE</div>
    <div class="auth-title">Nieuw wachtwoord</div>
    <div id="toast" class="toast" style="display:none"></div>
    <div id="form-wrap">
      <div class="field-group">
        <label class="field-label">Nieuw wachtwoord</label>
        <input type="password" id="password" class="field-input" placeholder="Minimaal 8 tekens" autocomplete="new-password">
      </div>
      <div class="field-group">
        <label class="field-label">Bevestig wachtwoord</label>
        <input type="password" id="password2" class="field-input" placeholder="Herhaal wachtwoord" autocomplete="new-password">
      </div>
      <button class="btn btn--primary" id="reset-btn" style="width:100%;margin-top:8px;padding:14px">Wachtwoord instellen →</button>
    </div>
    <div class="auth-footer"><a href="/login.html">Terug naar inloggen</a></div>
  </div>
</div>
<script>
(function(){
  var token=new URLSearchParams(window.location.search).get('token');
  function showToast(msg,type){var t=document.getElementById('toast');t.textContent=msg;t.style.display='block';t.style.background=type==='success'?'rgba(74,222,128,.15)':'rgba(248,113,113,.15)';setTimeout(function(){t.style.display='none';},6000);}
  if(!token){showToast('Ongeldige resetlink. Vraag een nieuwe aan.','error');document.getElementById('form-wrap').style.display='none';return;}
  document.getElementById('reset-btn').addEventListener('click',function(){
    var btn=this,pw=document.getElementById('password').value,pw2=document.getElementById('password2').value;
    if(pw.length<8){showToast('Wachtwoord moet minstens 8 tekens zijn.','error');return;}
    if(pw!==pw2){showToast('Wachtwoorden komen niet overeen.','error');return;}
    btn.textContent='Opslaan...';btn.disabled=true;
    fetch('/api/auth/reset-password',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token:token,password:pw})})
      .then(function(r){return r.json().then(function(d){return{ok:r.ok,data:d};});})
      .then(function(res){
        if(!res.ok){showToast(res.data.error||'Fout.','error');btn.disabled=false;btn.textContent='Wachtwoord instellen →';return;}
        showToast('✓ Wachtwoord gewijzigd! Je wordt doorgestuurd...','success');
        setTimeout(function(){window.location.href='/login.html';},2000);
      })
      .catch(function(){showToast('Verbindingsfout.','error');btn.disabled=false;btn.textContent='Wachtwoord instellen →';});
  });
}());
</script>
<script src="/chrome-bg.js"></script>
</body>
</html>
