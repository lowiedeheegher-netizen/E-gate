<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="color-scheme" content="dark">
<title>E-gate — Dashboard</title>
<link rel="stylesheet" href="/style.css">
<style>
.empty-state { text-align:center; padding:80px 24px; }
.empty-state .icon { font-size:48px; margin-bottom:16px; }
.empty-state h2 { font-family:var(--font-h); font-size:22px; font-weight:700; margin-bottom:8px; }
.empty-state p { color:var(--text-dim); font-size:14px; margin-bottom:28px; line-height:1.6; }
.loading-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:14px; }
.skel { background:var(--surface); border:1px solid var(--border); border-radius:12px; overflow:hidden; animation:pulse .8s ease-in-out infinite alternate; }
.skel-cover { height:140px; background:var(--border); }
.skel-body { padding:16px; }
.skel-line { height:12px; background:var(--border); border-radius:4px; margin-bottom:10px; }
.skel-line:last-child { width:60%; }
@keyframes pulse { from{opacity:.6} to{opacity:1} }

.gate-toggle {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 11px; font-weight: 700; letter-spacing: .5px; text-transform: uppercase;
  border: none; border-radius: 6px; padding: 5px 10px; cursor: pointer;
  font-family: var(--font-b); transition: opacity .15s, background .2s;
}
.gate-toggle.is-active  { background: rgba(74,222,128,.1);  color: var(--green); border: 1px solid rgba(74,222,128,.2); }
.gate-toggle.is-inactive{ background: rgba(255,59,0,.08);   color: var(--accent);border: 1px solid rgba(255,59,0,.15); }
.gate-toggle:hover { opacity:.75; }
.gate-inactive-badge {
  display:inline-block; font-size:9px; font-weight:700; letter-spacing:2px;
  text-transform:uppercase; color:var(--accent); background:rgba(255,59,0,.08);
  border:1px solid rgba(255,59,0,.15); border-radius:4px; padding:2px 7px; margin-left:6px; vertical-align:middle;
}

.qr-modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.75); backdrop-filter:blur(6px);
  display:flex; align-items:center; justify-content:center; z-index:9999; padding:20px; }
.qr-modal-box { background:#0a0a0c; border:1px solid var(--border); border-radius:var(--radius);
  padding:28px; max-width:320px; width:100%; text-align:center; }
.qr-modal-title { font-family:var(--font-h); font-size:16px; font-weight:700; margin-bottom:4px; }
.qr-modal-sub { font-size:12px; color:var(--text-dim); margin-bottom:20px; }
#qr-container canvas, #qr-container img { border-radius:8px; }
.qr-actions { display:flex; gap:8px; justify-content:center; margin-top:16px; }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>

<nav class="nav">
  <a class="nav-brand" href="/">E<span style="color:var(--text-muted)">-</span>GATE</a>
  <div class="nav-spacer"></div>
  <div class="nav-links">
    <span id="nav-name" style="font-size:13px;color:var(--text-dim);padding:0 10px"></span>
    <a class="nav-link" href="/stats.html">Statistieken</a>
    <a class="nav-link" href="/builder.html">Nieuwe gate</a>
    <button class="nav-link" id="logout-btn" type="button">Uitloggen</button>
  </div>
</nav>

<div class="page-wrap page-wrap--wide" style="padding-top:40px;padding-bottom:80px">

  <div style="display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:32px">
    <div>
      <h1 style="font-family:var(--font-h);font-size:26px;font-weight:700;letter-spacing:-.5px">Mijn E-gates</h1>
      <p style="font-size:13px;color:var(--text-dim);margin-top:4px">Jouw download gates op één plek</p>
    </div>
    <a class="btn btn--primary" href="/builder.html">+ Nieuwe E-gate</a>
  </div>

  <!-- Stats row -->
  <div class="stat-row" id="stat-row" style="display:none">
    <div class="stat-box">
      <div class="val" id="stat-gates">0</div>
      <div class="lbl">Gates</div>
    </div>
    <div class="stat-box">
      <div class="val" id="stat-views">0</div>
      <div class="lbl">Weergaven</div>
    </div>
    <div class="stat-box">
      <div class="val" id="stat-downloads">0</div>
      <div class="lbl">Downloads</div>
    </div>
  </div>

  <!-- Gate grid -->
  <div id="gate-container">
    <!-- skeleton -->
    <div class="loading-grid" id="skeleton">
      <div class="skel"><div class="skel-cover"></div><div class="skel-body"><div class="skel-line"></div><div class="skel-line"></div></div></div>
      <div class="skel"><div class="skel-cover"></div><div class="skel-body"><div class="skel-line"></div><div class="skel-line"></div></div></div>
      <div class="skel"><div class="skel-cover"></div><div class="skel-body"><div class="skel-line"></div><div class="skel-line"></div></div></div>
    </div>
    <div class="gate-grid" id="gate-grid" style="display:none"></div>
    <div id="empty-state" style="display:none">
      <div class="empty-state">
        <div class="icon">🎵</div>
        <h2>Nog geen gates</h2>
        <p>Maak je eerste E-gate aan en zet luisteraars<br>om in echte volgers.</p>
        <a class="btn btn--primary btn--lg" href="/builder.html">Maak je eerste E-gate</a>
      </div>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- QR Modal -->
<div class="qr-modal-overlay" id="qr-modal" style="display:none">
  <div class="qr-modal-box">
    <div class="qr-modal-title" id="qr-modal-title">QR Code</div>
    <div class="qr-modal-sub" id="qr-modal-sub"></div>
    <div id="qr-container"></div>
    <div class="qr-actions">
      <button class="btn btn--primary btn--sm" id="qr-download-btn">Download PNG</button>
      <button class="btn btn--ghost btn--sm" id="qr-close-btn">Sluiten</button>
    </div>
  </div>
</div>


<script>
(function() {
  // Auth guard
  var token = localStorage.getItem('egate_token');
  if (!token) { window.location.href = '/login.html'; return; }

  var name = localStorage.getItem('egate_name') || '';
  if (name) document.getElementById('nav-name').textContent = name;

  document.getElementById('logout-btn').addEventListener('click', function() {
    localStorage.removeItem('egate_token');
    localStorage.removeItem('egate_name');
    window.location.href = '/';
  });

  // Toast
  var toastEl = document.getElementById('toast');
  var toastTimer;
  function showToast(msg, type) {
    clearTimeout(toastTimer);
    toastEl.textContent = msg;
    toastEl.className = 'toast show ' + (type || '');
    toastTimer = setTimeout(function() { toastEl.classList.remove('show'); }, 2800);
  }

  // Copy to clipboard
  function copyText(text) {
    navigator.clipboard.writeText(text).then(function() {
      showToast('\u2713 Link gekopieerd', 'success');
    }).catch(function() {
      showToast('Kopiëren mislukt', 'error');
    });
  }

  // Render a gate card
  function renderCard(gate) {
    var gateUrl = window.location.origin + '/gate/' + gate.slug;
    var coverHtml = gate.cover_art
      ? '<img src="/uploads/covers/' + gate.cover_art + '" alt="' + escHtml(gate.track_name) + '">'
      : '<div class="gate-cover-ph">' + (gate.artist_name[0] || 'E').toUpperCase() + '</div>';

    var date = gate.created_at
      ? new Date(gate.created_at * 1000).toLocaleDateString('nl-BE', { day:'numeric', month:'short', year:'numeric' })
      : '';

    var card = document.createElement('div');
    card.className = 'gate-card';
    card.dataset.id = gate.id;
    card.innerHTML =
      '<div class="gate-cover">' + coverHtml +
        '<div class="gate-slug-badge">' + escHtml(gate.slug) + '</div>' +
      '</div>' +
      '<div class="gate-body">' +
        '<div class="gate-name">' + escHtml(gate.track_name) + '</div>' +
        '<div class="gate-artist">' + escHtml(gate.artist_name) + (date ? ' &mdash; ' + date : '') + '</div>' +
        '<div class="gate-stats">' +
          '<div class="gate-stat">\uD83D\uDC41 <strong>' + (gate.view_count || 0) + '</strong> views</div>' +
          '<div class="gate-stat">\u2B07 <strong>' + (gate.complete_count || 0) + '</strong> downloads</div>' +
        '</div>' +
        '<div class="gate-url-row">' +
          '<div class="gate-url" title="' + gateUrl + '">' + gateUrl.replace(/^https?:\/\//, '') + '</div>' +
          '<div class="gate-actions">' +
            '<a class="btn btn--ghost btn--sm" href="/builder.html?edit=' + gate.id + '" title="Bewerk gate">\u270E</a>' +
            '<a class="btn btn--ghost btn--sm" href="/api/gates/' + gate.id + '/mailinglist.csv?token=' + encodeURIComponent(token) + '" title="Download mailinglist CSV">CSV</a>' +
            '<button class="btn btn--ghost btn--sm copy-btn" data-url="' + gateUrl + '" title="Kopieer link">\uD83D\uDCCB</button>' +
            '<a class="btn btn--ghost btn--sm" href="' + gateUrl + '" target="_blank" rel="noopener" title="Bekijk gate">\u2197</a>' +
            '<button class="btn btn--danger btn--sm delete-btn" data-id="' + gate.id + '" data-name="' + escHtml(gate.track_name) + '" title="Verwijder">\uD83D\uDDD1</button>' +
          '</div>' +
        '</div>' +
      '</div>';
    return card;
  }

  function escHtml(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // QR Code modal
  var qrInstance = null;
  function openQrModal(url, trackName) {
    var modal   = document.getElementById('qr-modal');
    var title   = document.getElementById('qr-modal-title');
    var sub     = document.getElementById('qr-modal-sub');
    var container = document.getElementById('qr-container');
    title.textContent = trackName || 'QR Code';
    sub.textContent   = url.replace(/^https?:\/\//, '');
    container.innerHTML = '';
    qrInstance = new QRCode(container, {
      text: url, width:220, height:220,
      colorDark:'#ffffff', colorLight:'#0a0a0c',
      correctLevel: QRCode.CorrectLevel.H
    });
    modal.style.display = 'flex';
  }

  document.getElementById('qr-close-btn').addEventListener('click', function() {
    document.getElementById('qr-modal').style.display = 'none';
  });
  document.getElementById('qr-modal').addEventListener('click', function(e) {
    if (e.target === this) this.style.display = 'none';
  });
  document.getElementById('qr-download-btn').addEventListener('click', function() {
    var canvas = document.querySelector('#qr-container canvas');
    if (!canvas) return;
    var link = document.createElement('a');
    link.download = 'egate-qr.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
  });

  // Load gates
  // Check subscription status
  async function checkSubscription() {
    try {
      const r = await fetch('/api/me', { headers:{ Authorization:'Bearer '+token } });
      const u = await r.json();
      const banner = document.getElementById('sub-banner');
      if (!banner) return;
      // Email verification banner (shown first if not verified)
      if (u.role !== 'admin' && u.email_verified === false) {
        const verifyBanner = document.createElement('div');
        verifyBanner.className = 'sub-banner trial';
        verifyBanner.style.marginBottom = '10px';
        verifyBanner.innerHTML = '<div><div class="sub-banner-text">📧 Bevestig je e-mailadres</div><div class="sub-banner-sub">Check je inbox voor de bevestigingsmail.</div></div><button class="btn btn--ghost btn--sm" id="resend-verify-btn">Opnieuw versturen</button>';
        banner.parentNode.insertBefore(verifyBanner, banner);
        document.getElementById('resend-verify-btn').addEventListener('click', function() {
          this.textContent = 'Verstuurd ✓'; this.disabled = true;
          fetch('/api/auth/send-verification', { method:'POST', headers:{ Authorization:'Bearer '+token } }).catch(()=>{});
        });
      }
      if (u.subscription_status === 'trial' && u.trial_days_left !== null) {
        const d = u.trial_days_left;
        banner.className = 'sub-banner trial';
        banner.innerHTML = '<div><div class="sub-banner-text">⏳ Gratis trial — nog <strong>' + d + '</strong> '+(d===1?'dag':'dagen')+'</div><div class="sub-banner-sub">Daarna €2/maand. Je kan altijd opzeggen.</div></div><a href="/billing.html" class="btn btn--primary btn--sm">Abonneer nu</a>';
        banner.style.display = 'flex';
      } else if (u.subscription_status === 'canceled' || u.subscription_status === 'past_due') {
        banner.className = 'sub-banner canceled';
        banner.innerHTML = '<div><div class="sub-banner-text">⚠️ Abonnement inactief — je kan geen nieuwe gates aanmaken</div></div><a href="/billing.html" class="btn btn--primary btn--sm">Hernieuwen</a>';
        banner.style.display = 'flex';
      }
    } catch(e) {}
  }

  async function loadGates() {
    try {
      var res  = await fetch('/api/gates', { headers: { Authorization: 'Bearer ' + token } });
      if (res.status === 401) { localStorage.removeItem('egate_token'); window.location.href = '/login.html'; return; }
      var gates = await res.json();

      document.getElementById('skeleton').style.display = 'none';

      if (!gates.length) {
        document.getElementById('empty-state').style.display = 'block';
        return;
      }

      // Stats
      var totalViews = gates.reduce(function(a, g) { return a + (g.view_count || 0); }, 0);
      var totalDl    = gates.reduce(function(a, g) { return a + (g.complete_count || 0); }, 0);
      document.getElementById('stat-gates').textContent     = gates.length;
      document.getElementById('stat-views').textContent     = totalViews;
      document.getElementById('stat-downloads').textContent = totalDl;
      document.getElementById('stat-row').style.display     = 'flex';

      var grid = document.getElementById('gate-grid');
      grid.style.display = 'grid';
      gates.forEach(function(g) { grid.appendChild(renderCard(g)); });

    } catch(e) {
      document.getElementById('skeleton').style.display = 'none';
      document.getElementById('empty-state').style.display = 'block';
    }
  }

  // Event delegation for card buttons
  document.getElementById('gate-grid').addEventListener('click', async function(e) {
    var copyBtn = e.target.closest('.copy-btn');
    if (copyBtn) { copyText(copyBtn.dataset.url); return; }

    var qrBtn = e.target.closest('.qr-btn');
    if (qrBtn) {
      openQrModal(qrBtn.dataset.url, qrBtn.dataset.name);
      return;
    }

    var embedBtn = e.target.closest('.embed-btn');
    if (embedBtn) {
      var slug = embedBtn.dataset.slug;
      var embedCode = '<iframe src="' + window.location.origin + '/embed/' + slug + '" width="100%" height="700" frameborder="0" scrolling="no" allow="autoplay"></iframe>';
      navigator.clipboard.writeText(embedCode).then(function() {
        showToast('✓ Embed code gekopieerd!');
      }).catch(function() { showToast('Embed: ' + embedCode); });
      return;
    }

    // Toggle active/inactive
    var toggleBtn = e.target.closest('.toggle-btn');
    if (toggleBtn) {
      var gateId = toggleBtn.dataset.id;
      toggleBtn.disabled = true;
      fetch('/api/gates/' + gateId + '/toggle', {
        method: 'PATCH',
        headers: { Authorization: 'Bearer ' + token }
      }).then(function(r){ return r.json(); }).then(function(d) {
        var card = document.querySelector('.gate-card[data-id="' + gateId + '"]');
        if (!card) return;
        var nowActive = d.is_active;
        toggleBtn.className = 'gate-toggle ' + (nowActive ? 'is-active' : 'is-inactive') + ' toggle-btn';
        toggleBtn.textContent = nowActive ? '\u2713 Actief' : '\u2717 Gesloten';
        var badge = card.querySelector('.gate-inactive-badge');
        if (!nowActive && !badge) {
          var nameEl = card.querySelector('.gate-name');
          if (nameEl) nameEl.insertAdjacentHTML('beforeend','<span class="gate-inactive-badge">Gesloten</span>');
        } else if (nowActive && badge) { badge.remove(); }
        card.classList.toggle('gate-card--inactive', !nowActive);
        showToast(nowActive ? '\u2713 Gate actief' : 'Gate gesloten', nowActive ? 'success' : '');
      }).catch(function(){ showToast('Kon gate niet wijzigen', 'error'); })
        .finally(function(){ toggleBtn.disabled = false; });
      return;
    }

    var delBtn = e.target.closest('.delete-btn');
    if (!delBtn) return;
    var id   = delBtn.dataset.id;
    var name = delBtn.dataset.name;
    if (!confirm('Verwijder "' + name + '"? Dit kan niet ongedaan worden.')) return;

    delBtn.disabled = true;
    try {
      var res = await fetch('/api/gates/' + id, {
        method: 'DELETE',
        headers: { Authorization: 'Bearer ' + token }
      });
      if (!res.ok) { var d = await res.json(); showToast(d.error || 'Verwijderen mislukt', 'error'); delBtn.disabled = false; return; }
      var card = document.querySelector('.gate-card[data-id="' + id + '"]');
      if (card) { card.style.opacity = '0'; card.style.transform = 'scale(.95)'; card.style.transition = 'all .25s'; setTimeout(function(){ card.remove(); }, 260); }
      showToast('Gate verwijderd', 'success');
    } catch(e) {
      showToast('Verbindingsfout', 'error');
      delBtn.disabled = false;
    }
  });

  loadGates();
}());
</script>

<script src="/chrome-bg.js"></script>
</body>
</html>
