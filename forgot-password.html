<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="color-scheme" content="dark">
<title>Wachtwoord vergeten — E-gate</title>
<link rel="stylesheet" href="/style.css">
</head>
<body>
<nav class="nav"><a class="nav-brand" href="/">E<span style="color:var(--text-muted)">-</span>GATE</a></nav>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-brand">E-GATE</div>
    <div class="auth-title">Wachtwoord vergeten</div>
    <div class="auth-sub">Vul je e-mailadres in en ontvang een resetlink.</div>
    <div id="toast" class="toast" style="display:none"></div>
    <div class="field-group">
      <label class="field-label">E-mailadres</label>
      <input type="email" id="email" class="field-input" placeholder="jij@voorbeeld.com" autocomplete="email">
    </div>
    <button class="btn btn--primary" id="send-btn" style="width:100%;margin-top:8px;padding:14px">Stuur resetlink →</button>
    <div class="auth-footer"><a href="/login.html">Terug naar inloggen</a></div>
  </div>
</div>
<script>
(function(){
  function showToast(msg,type){var t=document.getElementById('toast');t.textContent=msg;t.style.display='block';t.style.background=type==='success'?'rgba(74,222,128,.15)':'rgba(248,113,113,.15)';setTimeout(function(){t.style.display='none';},6000);}
  document.getElementById('send-btn').addEventListener('click',function(){
    var btn=this,email=document.getElementById('email').value.trim();
    if(!email){showToast('Vul je e-mailadres in.','error');return;}
    btn.textContent='Versturen...';btn.disabled=true;
    fetch('/api/auth/forgot-password',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:email})})
      .then(function(){showToast('✓ Als dit adres bekend is, ontvang je een e-mail. Controleer ook je spam.','success');btn.textContent='Verstuurd ✓';})
      .catch(function(){showToast('Verbindingsfout.','error');btn.disabled=false;btn.textContent='Stuur resetlink →';});
  });
  document.getElementById('email').addEventListener('keydown',function(e){if(e.key==='Enter')document.getElementById('send-btn').click();});
}());
</script>
<script src="/chrome-bg.js"></script>
</body>
</html>
